name: datazen-functional

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: datazen
      MYSQL_PASSWORD: datazen
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: datazen
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30

  mariadb:
    image: mariadb:11.7
    environment:
      MARIADB_DATABASE: datazen
      MARIADB_PASSWORD: datazen
      MARIADB_ROOT_PASSWORD: root
      MARIADB_USER: datazen
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30

  postgresql:
    image: postgres:16
    environment:
      POSTGRES_DB: datazen
      POSTGRES_PASSWORD: datazen
      POSTGRES_USER: datazen
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datazen -d datazen"]
      interval: 5s
      timeout: 5s
      retries: 30

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      SA_PASSWORD: "Datazen123!"
    ports:
      - "1433:1433"
